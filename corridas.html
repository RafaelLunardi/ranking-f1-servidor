<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendário | Ruins de Roda</title>
    <meta name="description" content="Proximas corridas do servidor de F1." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=16" />
  </head>
  <body data-page="corridas">
    <header class="page-hero race-hero">
      <nav class="topbar" aria-label="Navegacao principal">
        <a class="brand" href="index.html" aria-label="Ruins de Roda inicio"><span class="brand-mark">F1</span><span>Ruins de Roda</span></a>
        <div class="nav-links">
          <a href="rankings.html" data-nav="rankings">Rankings</a>
          <a href="corridas.html" data-nav="corridas">Calendário</a>
          <a href="noticias.html" data-nav="noticias">Noticias</a>
          <a href="lives.html" data-nav="lives">Lives</a>
          <a href="regras.html" data-nav="regras">Regras</a>
        </div>
      </nav>
      <div class="page-title with-switch">
        <div>
          <p class="eyebrow">Agenda</p>
          <h1>Calendário</h1>
          <p>Calendario dos proximos GPs do servidor, com series, horarios e formatos.</p>
        </div>
        <div class="championship-switch" aria-label="Categoria">
          <button type="button" data-championship="f1">F1</button>
          <button class="active" type="button" data-championship="f2">F2</button>
        </div>
      </div>
    </header>

    <main>
      <section class="section race-section">
        <div class="race-section-title">
          <svg class="race-title-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 2v3M13 2v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <h2>Próximos GPs</h2>
        </div>
        <div class="race-layout">
          <div class="race-list" id="raceList"></div>
          <aside class="next-race-panel" id="nextRacePanel" aria-label="Proxima corrida"></aside>
        </div>
      </section>
    </main>

    <footer>
      <p>Ruins de Roda. Atualize os dados em <code>data.js</code>.</p>
      <a href="index.html">Voltar para inicio</a>
    </footer>

    <script src="data.js?v=16"></script>
    <script src="sheet-data.js?v=16"></script>
    <script src="app.js?v=16"></script>
  </body>
</html>
